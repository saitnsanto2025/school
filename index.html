<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>School Registration</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #361246, #591764);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow: hidden;
}

.bg-circle {
  position: absolute;
  border-radius: 50%;
  opacity: 0.25;
  animation: float 8s ease-in-out infinite;
}

.circle-one {
  width: 260px;
  height: 260px;
  background: #eb1b41;
  top: -80px;
  left: -80px;
}

.circle-two {
  width: 220px;
  height: 220px;
  background: #ffffff;
  bottom: -70px;
  right: -70px;
}

@keyframes float {
  0%, 100% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(25px);
  }
}

.card {
  width: 100%;
  max-width: 460px;
  background: #ffffff;
  border-radius: 24px;
  padding: 35px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.35);
  border-top: 7px solid #eb1b41;
  position: relative;
  z-index: 2;
  animation: fadeIn 0.7s ease;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(25px) scale(0.96);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.logo {
  display: block;
  width: 125px;
  margin: 0 auto 20px;
}

h2 {
  text-align: center;
  color: #361246;
  margin-bottom: 8px;
}

.subtitle {
  text-align: center;
  color: #591764;
  margin-bottom: 30px;
  font-size: 15px;
}

label {
  display: block;
  margin-bottom: 8px;
  color: #361246;
  font-weight: 700;
}

input {
  width: 100%;
  padding: 14px;
  border: 1px solid #d9d2e0;
  border-radius: 12px;
  font-size: 15px;
  margin-bottom: 20px;
  color: #2b1337;
}

input:focus {
  border-color: #eb1b41;
  outline: none;
  box-shadow: 0 0 0 4px rgba(235, 27, 65, 0.15);
}

button {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 12px;
  background: #eb1b41;
  color: #ffffff;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  transition: 0.3s ease;
}

button:hover {
  background: #c91435;
  transform: translateY(-2px);
}

button:disabled {
  opacity: 0.7;
  cursor: not-allowed;
}

.footer {
  margin-top: 22px;
  text-align: center;
  color: #591764;
  font-size: 13px;
}

.thank-you {
  display: none;
  text-align: center;
}

.checkmark {
  width: 90px;
  height: 90px;
  background: #eb1b41;
  color: #ffffff;
  border-radius: 50%;
  margin: 0 auto 25px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  font-weight: bold;
  animation: pop 0.6s ease;
}

@keyframes pop {
  0% {
    transform: scale(0);
  }
  70% {
    transform: scale(1.15);
  }
  100% {
    transform: scale(1);
  }
}

.thank-you h1 {
  color: #361246;
  margin-bottom: 12px;
}

.thank-you p {
  color: #591764;
  line-height: 1.6;
  margin-bottom: 25px;
}

.error-message {
  display: none;
  background: rgba(235, 27, 65, 0.1);
  color: #eb1b41;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 18px;
  font-size: 14px;
  text-align: center;
}
</style>
</head>

<body>

<div class="bg-circle circle-one"></div>
<div class="bg-circle circle-two"></div>

<div class="card" id="formCard">

  <img
    src="https://raw.githubusercontent.com/saitnsanto2025/dcashlogo.png/main/73.png"
    class="logo"
    alt="DCash Logo"
  />

  <h2> Forex classes registration</h2>
  <p class="subtitle">Enter your details below</p>

  <div class="error-message" id="errorMessage">
    Registration failed. Please try again.
  </div>

  <form id="registrationForm">

    <label>Full Name</label>
    <input type="text" name="name" placeholder="John Doe" required />

    <label>Email Address</label>
    <input type="email" name="email" placeholder="john@example.com" required />

    <label>Phone Number</label>
    <input type="tel" name="phone" placeholder="+254712345678" required />

    <button type="submit" id="submitBtn">Submit Registration</button>

  </form>

  <div class="footer">Powered by DCash</div>

</div>

<div class="card thank-you" id="thankYouCard">

  <div class="checkmark">✓</div>

  <h1>Registration Successful!</h1>

  <p>
    Thank you for registering.<br />
    Your details have been received successfully.
  </p>

  <button onclick="location.reload()">Register Another Person</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script>
const form = document.getElementById("registrationForm");
const submitBtn = document.getElementById("submitBtn");
const formCard = document.getElementById("formCard");
const thankYouCard = document.getElementById("thankYouCard");
const errorMessage = document.getElementById("errorMessage");

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  errorMessage.style.display = "none";
  submitBtn.disabled = true;
  submitBtn.innerHTML = "Submitting...";

  const payload = {
    name: form.name.value.trim(),
    email: form.email.value.trim(),
    phone: form.phone.value.trim()
  };

  try {
    const response = await fetch("https://l3j2qk3a.rcsrv.net/webhook/school", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    if (!response.ok) {
      throw new Error("Submission failed");
    }

    formCard.style.display = "none";
    thankYouCard.style.display = "block";

    confetti({
      particleCount: 250,
      spread: 120,
      origin: { y: 0.6 }
    });

  } catch (error) {
    errorMessage.style.display = "block";
    submitBtn.disabled = false;
    submitBtn.innerHTML = "Submit Registration";
  }
});
</script>

</body>
</html>
